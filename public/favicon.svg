<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <!-- Background circle (mozzarella ball) -->
  <defs>
    <radialGradient id="mozzGrad" cx="38%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="55%" stop-color="#f5f0e8"/>
      <stop offset="100%" stop-color="#d8d0c0"/>
    </radialGradient>
    <radialGradient id="shineGrad" cx="35%" cy="30%" r="30%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Main ball -->
  <circle cx="32" cy="32" r="28" fill="url(#mozzGrad)" stroke="#c8c0b0" stroke-width="0.5"/>
  <!-- Glossy highlight -->
  <ellipse cx="24" cy="20" rx="12" ry="8" fill="url(#shineGrad)"/>
  <!-- Small highlight dot -->
  <ellipse cx="20" cy="17" rx="5" ry="3" fill="#ffffff" opacity="0.7"/>
  <!-- Subtle surface texture lines (mozzarella folds) -->
  <path d="M14 36 Q32 34 50 38" stroke="#d0c8b8" stroke-width="1" fill="none" opacity="0.4"/>
  <path d="M16 44 Q32 42 48 45" stroke="#d0c8b8" stroke-width="0.8" fill="none" opacity="0.3"/>
</svg>